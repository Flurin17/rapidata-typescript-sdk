name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Select the semantic version bump to publish
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs from main
        if: github.ref_name != 'main'
        run: |
          echo "Release PRs must be created from the main branch."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.1
          cache: npm

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        run: npm version "${{ inputs.version_bump }}" --no-git-tag-version

      - name: Sync runtime version constant
        run: npm run sync:version

      - name: Verify package
        run: npm run verify

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        id: branch
        run: echo "name=release/v${{ steps.version.outputs.value }}" >> "$GITHUB_OUTPUT"

      - name: Commit release artifacts
        run: |
          git switch -c "${{ steps.branch.outputs.name }}"
          git add package.json package-lock.json src/version.ts
          git commit -m "release: v${{ steps.version.outputs.value }}"
          git push -u origin "${{ steps.branch.outputs.name }}"

      - name: Open release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh pr list \
            --head "${{ steps.branch.outputs.name }}" \
            --base main \
            --json url \
            --jq '.[0].url')

          if [ -n "$existing" ]; then
            echo "Release PR already exists: $existing"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "release: v${{ steps.version.outputs.value }}" \
            --body "Prepares release v${{ steps.version.outputs.value }} for merge into main."
