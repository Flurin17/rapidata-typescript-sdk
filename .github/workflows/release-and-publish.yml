name: Release And Publish

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Select the semantic version bump to publish
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow runs from main
        if: github.ref_name != 'main'
        run: |
          echo "Releases must be created from the main branch."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        run: npm version "${{ inputs.version_bump }}" --no-git-tag-version

      - name: Sync runtime version constant
        run: npm run sync:version

      - name: Verify package
        run: npm run verify

      - name: Read version
        id: version
        run: echo "value=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Commit release artifacts
        run: |
          git add package.json package-lock.json src/version.ts
          git commit -m "release: v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Publish to npm
        run: npm publish --provenance

      - name: Create GitHub release
        run: gh release create "v${{ steps.version.outputs.value }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
