name: Publish Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/version.ts

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.8.1
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: npm run verify

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether release tag already exists
        id: tag
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.version.outputs.value }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.value }}"
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Publish to npm
        if: steps.tag.outputs.exists == 'false'
        run: npm publish --provenance

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        run: gh release create "v${{ steps.version.outputs.value }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
